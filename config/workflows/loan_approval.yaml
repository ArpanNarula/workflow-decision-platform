workflow:
  name: loan_approval
  description: Personal loan decision workflow
  version: '1.0'
  author: Arpan Narula
stages:
- name: schema_validation
  type: validation
  required: true
  required_fields:
  - age
  - monthly_income
  - loan_amount
  - employment_status
- name: credit_check
  type: external_dependency
  required: true
  dependency: credit_bureau
  timeout_seconds: 5
- name: rule_evaluation
  type: rules
  required: true
  rules:
  - id: age_min
    description: Applicant must be at least 18 years old
    condition: data.age >= 18
    on_fail: reject
  - id: age_max
    description: Applicant must be under 65 years old
    condition: data.age <= 65
    on_fail: reject
  - id: min_income
    description: Monthly income must be at least Rs. 25,000
    condition: data.monthly_income >= 25000
    on_fail: reject
  - id: credit_score_threshold
    description: Credit score must be 600 or above
    condition: external.credit_score >= 600
    on_fail: reject
  - id: loan_to_income_ratio
    description: Loan amount must not exceed 10x monthly income
    condition: data.loan_amount <= data.monthly_income * 10
    on_fail: manual_review
  - id: employment_check
    description: Applicant must be employed or self-employed
    condition: data.employment_status in ['employed', 'self_employed']
    on_fail: reject
  - id: existing_loans_limit
    description: Applicant must not hold more than 3 active loans
    condition: data.existing_loans <= 3
    on_fail: manual_review
- name: ai_decision
  type: ai_agent
  required: true
  enabled: true
  model: gemini-1.5-flash
- name: final_decision
  type: decision
  required: true
retry:
  max_attempts: 3
  backoff_seconds: 2
external_dependencies:
- name: credit_bureau
  type: mock
  description: Simulates a credit bureau API with a 15% failure rate for retry testing
